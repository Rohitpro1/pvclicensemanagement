# Render deployment blueprint for the PVC License Manager backend.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pvc-license-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: pvc_license_manager
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: ADMIN_EMAIL
        value: admin@pvccards.com
      - key: ADMIN_PASSWORD
        value: Admin@123
      - key: CORS_ORIGINS
        value: "*"
